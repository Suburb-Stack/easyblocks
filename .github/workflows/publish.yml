name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
      - porting-to-next-16
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@suburb-stack"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Calculate version
        id: version
        run: |
          # Get branch name (remove refs/heads/ prefix)
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          # Sanitize branch name for npm (replace / with -)
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g')
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Get current base version from lerna.json
          BASE_VERSION=$(node -p "require('./lerna.json').version")
          # Create prerelease version: base-branch.sha
          VERSION="${BASE_VERSION}-${SAFE_BRANCH}.${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

      - name: Update package versions
        run: |
          npx lerna version ${{ steps.version.outputs.version }} --yes --no-git-tag-version --no-push --force-publish

      - name: Commit version bump (required for lerna publish)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lerna.json **/package.json
          git commit -m "chore(release): ${{ steps.version.outputs.version }}" || echo "No changes to commit"

      - name: Publish packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Use pnpm to publish each package directly (workaround for lerna 9.x bug)
          for pkg in packages/core packages/design-system packages/editor; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg..."
              cd "$pkg"
              pnpm publish --no-git-checks --access public || echo "Failed to publish $pkg (may already exist)"
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version bump commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Dry run - show what would be published
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== Dry run mode - showing packages that would be published ==="
          echo "Version: ${{ steps.version.outputs.version }}"
          npx lerna ls --json --no-private | jq -r '.[].name'
          echo ""
          echo "=== Package versions ==="
          npx lerna ls -l --no-private
