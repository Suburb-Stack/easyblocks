name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@suburb-stack"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm exec lerna publish from-git --yes --no-private
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run - show what would be published
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== Dry run mode - showing packages that would be published ==="
          pnpm exec lerna ls --json --no-private | jq -r '.[].name'
          echo ""
          echo "=== Package versions ==="
          pnpm exec lerna ls -l --no-private
