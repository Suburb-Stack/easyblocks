name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
      - porting-to-next-16
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@suburb-stack"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Calculate version
        id: version
        run: |
          # Get branch name (remove refs/heads/ prefix)
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          # Sanitize branch name for npm (replace / with -)
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g')
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Get current base version from lerna.json
          BASE_VERSION=$(node -p "require('./lerna.json').version")
          # Create prerelease version: base-branch.sha
          VERSION="${BASE_VERSION}-${SAFE_BRANCH}.${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

      - name: Update package versions
        run: |
          pnpm exec lerna version ${{ steps.version.outputs.version }} --yes --no-git-tag-version --no-push --force-publish

      - name: Publish packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm exec lerna publish from-package --yes --no-private --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run - show what would be published
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== Dry run mode - showing packages that would be published ==="
          echo "Version: ${{ steps.version.outputs.version }}"
          pnpm exec lerna ls --json --no-private | jq -r '.[].name'
          echo ""
          echo "=== Package versions ==="
          pnpm exec lerna ls -l --no-private
